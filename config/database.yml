default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5).to_i %>

development:
  <<: *default
  database: street_chef_rails_development

test:
  <<: *default
  database: street_chef_rails_test

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
